<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cámara Web Móvil</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-dark text-white">
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 text-center">
                <h2 class="mb-4">Visor de Cámara Móvil</h2>
                
                <div class="video-container mb-3 bg-black rounded shadow-lg position-relative overflow-hidden">
                    <video id="cameraStream" autoplay playsinline class="w-100 h-100 object-fit-cover"></video>
                    <div id="loadingOverlay" class="position-absolute top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center bg-dark bg-opacity-75 d-none">
                        <div class="spinner-border text-light" role="status">
                            <span class="visually-hidden">Cargando...</span>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-center flex-wrap gap-2">
                    <button id="btnStart" class="btn btn-primary px-4">
                        <i class="bi bi-camera-fill"></i> Iniciar
                    </button>
                    <button id="btnStop" class="btn btn-danger px-4" disabled>
                        <i class="bi bi-stop-circle-fill"></i> Detener
                    </button>
                    <button id="btnSwitch" class="btn btn-secondary px-4" disabled>
                        <i class="bi bi-arrow-repeat"></i> Cambiar Lente
                    </button>
                </div>
                
                <div id="errorMessage" class="alert alert-danger mt-3 d-none" role="alert">
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
